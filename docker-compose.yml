version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hr_designer_postgres
    environment:
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: hr_workflow_db
    ports:
      - "5433:5432"
    volumes:
      - pg_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_user -d hr_workflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
    container_name: hr_designer_backend
    environment:
      # Defaults to SQLite if not provided, but uses PostgreSQL when running in Docker
      - DATABASE_URL=postgresql://hr_user:password123@postgres:5432/hr_workflow_db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: hr_designer_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://100.31.42.74:8000    # Use user EC2 PUBLIC ADDRESS eg: <http://3.90.21.171:8000>
    depends_on:
      - backend

volumes:
  pg_data_v2:
