apiVersion: apps/v1
kind: Deployment
metadata:
  name: tredence-frontend
  namespace: tredence
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: YOUR_DOCKERHUB_USERNAME/tredence-hr-designer-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5173
        env:
        - name: VITE_API_URL
          value: "http://BACKEND_LOADBALANCER_OR_INGRESS_URL:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: tredence
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5173
